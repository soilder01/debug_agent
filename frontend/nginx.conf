upstream debug_agent_backend {
    server backend:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 50m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /api {
        return 308 /api/;
    }

    # The Vite development server rewrites /api/* to backend /*.
    # Keep the same browser contract in the containerized deployment.
    location /api/ {
        proxy_pass http://debug_agent_backend/;
    }

    location ~ ^/(health|performance|observability|operations|lark|spreadsheets|cases|jobs|debug-batches|debug-jobs|imports|artifacts|exports|agent-models|worker)(/|$) {
        proxy_pass http://debug_agent_backend;
    }

    location /xiaod/ {
        proxy_pass http://debug_agent_backend;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
